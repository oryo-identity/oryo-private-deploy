# Oryo private-deployment values template.
#
# Copy to values.yaml, fill in the placeholders below, then:
#   helm install oryo ./oryo-platform --namespace oryo --values values.yaml

global:
  # ---------------------------------------------------------------------------
  # IMAGES — pulled from Oryo's distribution ECR.
  # Your AWS account must be on the allowlist; contact licensing@oryo.io.
  # ---------------------------------------------------------------------------
  imageRegistry: 831622638566.dkr.ecr.us-east-1.amazonaws.com  # Oryo prod ECR
  imageTag: latest  # pin to a specific version in production
  imagePullPolicy: Always
  imagePullSecrets: []

  env:
    ENV_NAME: stage  # `stage` is the private-deploy value — always use it
    DOMAIN: example.com                                # TODO: your domain
    APP_BASE_URL: https://app.example.com              # TODO: https://app.<DOMAIN>
    API_BASE_URL: https://api.example.com              # TODO: https://api.<DOMAIN> — sensors phone home here
    DEFAULT_BUCKET: oryo-objects-<account>-<region>    # TODO: from verify.sh output

  db:
    host: <rds-endpoint>.rds.amazonaws.com             # TODO: your RDS endpoint
    port: 5432
    database: postgres
    sslmode: require

  externalSecrets:
    SESSION_SECRET:
      secretName: oryo-session-secret
      key: value

serviceAccount:
  # Keep this name — your IAM role's trust policy binds to
  # system:serviceaccount:<namespace>:oryo-platform (see docs/prereqs.md §2).
  name: oryo-platform
  annotations:
    # TODO: paste the role ARN printed by verify.sh
    eks.amazonaws.com/role-arn: arn:aws:iam::<ACCOUNT_ID>:role/OryoWorkloadRole

# ---------------------------------------------------------------------------
# DB initialization — runs once as a Helm hook to create Postgres roles,
# tables, and the default tenant. Set enabled=false on subsequent upgrades
# if you want to avoid the hook firing.
# ---------------------------------------------------------------------------
dbInit:
  enabled: true
  mode: hook
  adminSecret:
    name: oryo-db-admin
    userKey: username
    passwordKey: password
  passwordSecrets:
    DASHBOARD_USER_PASSWORD: { secretName: oryo-db-dashboard, key: password }
    GATEWAY_USER_PASSWORD:   { secretName: oryo-db-gateway,   key: password }
    WORKER_USER_PASSWORD:    { secretName: oryo-db-worker,    key: password }
  defaultTenant:
    name: '<Your Org>'                                 # TODO
    owner: admin@example.com                           # TODO

# ---------------------------------------------------------------------------
# Workloads — each block configures one of the four services.
# ---------------------------------------------------------------------------

dashboard:
  replicas: 2
  ingress:
    enabled: true
    className: alb
    host: app.example.com                                         # TODO
    annotations: &albAnnotations
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
      alb.ingress.kubernetes.io/ssl-redirect: '443'
      alb.ingress.kubernetes.io/certificate-arn: <ACM_CERT_ARN>   # TODO
      alb.ingress.kubernetes.io/group.name: oryo
      alb.ingress.kubernetes.io/healthcheck-path: /healthcheck
  db:
    passwordSecret: { name: oryo-db-dashboard, key: password }
  # RESEND_API_KEY must be set in .env so use your own
  # Resend key or ask the Oryo team for one).
  externalSecrets:
    RESEND_API_KEY: { secretName: oryo-resend-api-key, key: value }

gateway:
  replicas: 2
  ingress:
    enabled: true
    className: alb
    host: gateway.example.com                          # TODO
    annotations: *albAnnotations
  db:
    passwordSecret: { name: oryo-db-gateway, key: password }

workers:
  replicas: 1
  db:
    passwordSecret: { name: oryo-db-worker, key: password }

api:
  enabled: true
  replicas: 2
  ingress:
    enabled: true
    className: alb
    host: api.example.com                              # TODO
    annotations: *albAnnotations
  db:
    passwordSecret: { name: oryo-db-dashboard, key: password }
  env:
    # Bucket for where sensor-binaries live. Oryo provides a public s3-bucket
    # override if you want to manage your own release of sensor binaries
    SENSOR_EXECUTABLES_BUCKET: binaries-pub-prod-us-east-1-oryo

