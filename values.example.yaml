# Oryo private-deployment values template.
#
# Copy to values.yaml, fill in the placeholders below, then:
#   helm install oryo ./oryo-platform --namespace oryo --values values.yaml
#
# Anything not overridden falls back to defaults in oryo-platform/values.yaml.
# See docs/runbook.md for the long form.

global:
  # ---------------------------------------------------------------------------
  # IMAGES — pulled from Oryo's distribution ECR.
  # Your AWS account must be on the allowlist; contact licensing@oryo.io.
  # ---------------------------------------------------------------------------
  imageRegistry: 831622638566.dkr.ecr.us-east-1.amazonaws.com  # Oryo prod ECR
  imageTag: latest  # pin to a specific version in production
  imagePullPolicy: Always
  imagePullSecrets: []

  # The values marked REQUIRED below fail-fast at `helm install/template` time —
  # an empty value aborts the render with a pointer to docs/prereqs.md, rather
  # than deploying a broken release that only fails later at ALB/DB time.
  env:
    ENV_NAME: stage  # `stage` is the private-deploy value — always use it. `prod` is reserved for Oryo's own SaaS; `dev`/`local` enable developer-only behavior. See docs/runbook.md §3.
    DOMAIN: example.com                                # REQUIRED — your domain
    APP_BASE_URL: https://app.example.com              # REQUIRED — https://app.<DOMAIN>
    API_BASE_URL: https://api.example.com              # REQUIRED — https://api.<DOMAIN> (unset falls back to Oryo's api.oryo.io — wrong for a private deploy)
    DEFAULT_BUCKET: oryo-objects-<account>-<region>    # REQUIRED — from setup.sh output

    # (RESEND_API_KEY is required and lives on dashboard.externalSecrets below.)

  db:
    host: <rds-endpoint>.rds.amazonaws.com             # REQUIRED — your RDS endpoint
    port: 5432
    database: postgres                                 # REQUIRED — the database must already exist; `postgres` is RDS's default
    sslmode: require

  externalSecrets:
    SESSION_SECRET:
      secretName: oryo-session-secret
      key: value
    # Add ORYO_ENTRA_APP_SECRET / RESEND_API_KEY / etc. here if you use them.

serviceAccount:
  # Keep this name — your IAM role's trust policy binds to
  # system:serviceaccount:<namespace>:oryo-platform (see docs/prereqs.md §2).
  name: oryo-platform
  annotations:
    # TODO: paste the role ARN printed by setup.sh
    eks.amazonaws.com/role-arn: arn:aws:iam::<ACCOUNT_ID>:role/OryoWorkloadRole

# ---------------------------------------------------------------------------
# DB initialization — runs once as a Helm hook to create Postgres roles,
# tables, and the default tenant. Set enabled=false on subsequent upgrades
# if you want to avoid the hook firing.
# ---------------------------------------------------------------------------
dbInit:
  enabled: true
  mode: hook
  adminSecret:
    name: oryo-db-admin
    userKey: username
    passwordKey: password
  passwordSecrets:
    DASHBOARD_USER_PASSWORD: { secretName: oryo-db-dashboard, key: password }
    GATEWAY_USER_PASSWORD:   { secretName: oryo-db-gateway,   key: password }
    WORKER_USER_PASSWORD:    { secretName: oryo-db-worker,    key: password }
  defaultTenant:
    name: '<Your Org>'                                 # TODO
    owner: admin@example.com                           # TODO

# ---------------------------------------------------------------------------
# Workloads — each block configures one of the four services.
# ---------------------------------------------------------------------------

dashboard:
  replicas: 2
  ingress:
    enabled: true
    className: alb
    host: app.example.com                              # REQUIRED when ingress.enabled
    annotations: &albAnnotations
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
      alb.ingress.kubernetes.io/ssl-redirect: '443'
      alb.ingress.kubernetes.io/certificate-arn: <ACM_CERT_ARN>   # TODO
      alb.ingress.kubernetes.io/group.name: oryo
      alb.ingress.kubernetes.io/healthcheck-path: /healthcheck
  db:
    passwordSecret: { name: oryo-db-dashboard, key: password }
  # Email login codes via Resend — required. RESEND_API_KEY must be set in
  # .env so setup.sh creates the `oryo-resend-api-key` secret (use your own
  # Resend key or ask the Oryo team for one).
  externalSecrets:
    RESEND_API_KEY: { secretName: oryo-resend-api-key, key: value }

gateway:
  replicas: 2
  ingress:
    enabled: true
    className: alb
    host: gateway.example.com                          # REQUIRED when ingress.enabled
    annotations: *albAnnotations
  db:
    passwordSecret: { name: oryo-db-gateway, key: password }

workers:
  replicas: 1
  db:
    passwordSecret: { name: oryo-db-worker, key: password }

api:
  enabled: true
  replicas: 2
  ingress:
    enabled: true
    className: alb
    host: api.example.com                              # REQUIRED when ingress.enabled
    annotations: *albAnnotations
  db:
    passwordSecret: { name: oryo-db-dashboard, key: password }
  env:
    # Oryo's public sensor-binaries bucket. The dashboard's Installation tab
    # links to install.sh / install.ps1 / install-linux.sh hosted here.
    # TODO: from setup.sh output (defaults to the prod bucket; override only
    # if Oryo gave you a different one, e.g. air-gap / mirror).
    SENSOR_EXECUTABLES_BUCKET: binaries-pub-prod-us-east-1-oryo

