# Default values for the oryo-platform chart.
# Override with -f my-values.yaml or --set on the command line.

# -----------------------------------------------------------------------------
# Global settings — shared across all services
# -----------------------------------------------------------------------------
global:
  # Image registry (defaults to AWS ECR for the configured account/region).
  # Override `imageRegistry` to publish to GHCR, a private registry, etc.
  imageRegistry: '' # e.g. 123456789012.dkr.ecr.us-east-1.amazonaws.com
  imageTag: latest # default tag applied unless service.image.tag overrides
  imagePullPolicy: IfNotPresent
  imagePullSecrets: [] # e.g. [{ name: ecr-pull-secret }]

  nodeArchitecture: arm64

  # Create the `alb` IngressClass (EKS Auto Mode's built-in controller).
  # Set false if the class already exists in your cluster.
  createIngressClass: true
  ingressClassName: alb

  # Extra pod labels merged onto every workload's pod template. Required for
  # cloud workload-identity bindings that select pods by label, e.g. AKS:
  #   podLabels:
  #     azure.workload.identity/use: "true"
  # EKS (IRSA) and GKE (Workload Identity) do NOT need this — they bind via
  # ServiceAccount annotations (see serviceAccount.annotations below).
  podLabels: {}

  # Common environment variables (mirror locals.environment_variables in
  # deploy/terraform/locals.tf). Empty values are dropped at render time.
  env:
    ENV_NAME: stage # private-deploy chart default — `stage` is the private-deploy value (always). `prod` is reserved for Oryo's own SaaS.
    DOMAIN: '' # e.g. devoryo.com
    APP_BASE_URL: '' # e.g. https://app.devoryo.com
    API_BASE_URL: '' # e.g. https://api.devoryo.com — falls back to https://api.oryo.io in dashboard schema
    DEFAULT_BUCKET: '' # S3 bucket for object storage
    SLACK_ERROR_WEBHOOK: ''
    LOGIN_CODE_FROM_EMAIL: noreply@oryo.io
    ORYO_ENTRA_APP_ID: ''

  # Database connection (shared across services). Per-service `db.user`/`db.role`
  # overrides exist below to mirror the per-service Postgres roles in ECS.
  db:
    host: '' # e.g. postgres-main.xxxxx.us-east-1.rds.amazonaws.com
    port: 5432
    database: '' # e.g. platformprod
    sslmode: require

  # External secret references. Each entry maps an env-var name to a
  # Kubernetes Secret + key. Use these instead of `secrets.values` when the
  # secret is managed outside the chart (External Secrets Operator, SealedSecrets,
  # CSI driver, etc.).
  #
  # Example:
  #   externalSecrets:
  #     SESSION_SECRET:
  #       secretName: oryo-session-secret
  #       key: value
  externalSecrets: {}

  # Inline secret values. ONLY use for local/dev — for production prefer
  # externalSecrets. When set, a Kubernetes Secret named `<release>-secrets`
  # is generated.
  secrets: {}
  # Example:
  # secrets:
  #   SESSION_SECRET: "change-me"
  #   ORYO_ENTRA_APP_SECRET: "change-me"

# -----------------------------------------------------------------------------
# Database initialization — runs the @service/db-init image to create roles,
# tables, RLS policies, and the default tenant. Idempotent.
#
# Secret model:
#   - dbInit.adminSecret holds Postgres SUPERUSER credentials. Only this Job
#     mounts it; runtime services never see it.
#   - dbInit.passwordSecrets references the SAME Kubernetes Secrets that each
#     service binds via <service>.db.passwordSecret. Single source of truth:
#     db-init writes them into Postgres roles, services read them to connect.
# -----------------------------------------------------------------------------
dbInit:
  enabled: true

  # Execution mode (defaults to "disabled" so the chart renders without
  # admin credentials configured — set to "hook" for production):
  #   hook     — runs as a Helm pre-install Job (one-time bootstrap only).
  #              Helm blocks the install until it succeeds. Does NOT run on
  #              `helm upgrade`. RECOMMENDED for production.
  #   manual   — renders a normal Job resource. kubectl/argo apply runs it
  #              independently. Use when CI owns the bootstrap lifecycle.
  #   disabled — does not render the Job. Use when the DB is bootstrapped
  #              out-of-band (DBA, separate pipeline, etc.).
  mode: disabled

  image:
    repository: db-init
    tag: '' # falls back to global.imageTag

  # Postgres admin (superuser) credentials. Required for CREATE/ALTER ROLE.
  # Reference an externally-managed Secret — do NOT inline.
  adminSecret:
    name: '' # e.g. oryo-db-admin
    userKey: username
    passwordKey: password

  # Per-role password sources. Each entry binds an env var that db-init reads
  # to a Kubernetes Secret + key. The SAME Secret should be referenced by the
  # corresponding <service>.db.passwordSecret so the password set in Postgres
  # matches what the service connects with.
  #
  # Only roles that runtime services log in as need a password wired here.
  # AUTH is intentionally omitted — it's reached via SET ROLE (membership
  # grant), not direct login. SUPPORT is wired only when backoffice runs in
  # the cluster (it connects as SUPPORT for full cross-tenant access).
  # db-init creates any role without a LOGIN PASSWORD when its env var is
  # absent.
  passwordSecrets: {}
  # Example:
  # passwordSecrets:
  #   DASHBOARD_USER_PASSWORD: { secretName: oryo-db-dashboard, key: password }
  #   GATEWAY_USER_PASSWORD:   { secretName: oryo-db-gateway,   key: password }
  #   WORKER_USER_PASSWORD:    { secretName: oryo-db-worker,    key: password }
  #   SUPPORT_USER_PASSWORD:   { secretName: oryo-db-support,   key: password }

  # Optional default tenant bootstrap.
  defaultTenant:
    name: '' # e.g. "Acme Corp"
    owner: '' # e.g. admin@acme.com

  # Job tunables.
  backoffLimit: 3
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: 600 # auto-clean finished hook pods after 10m
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  nodeSelector: {}
  tolerations: []
  affinity: {}

# -----------------------------------------------------------------------------
# ServiceAccount — used by all workloads. Annotate with an IAM role ARN for
# IRSA on EKS so pods get S3 + Bedrock access without static credentials.
# -----------------------------------------------------------------------------
serviceAccount:
  create: true
  name: '' # defaults to <release>-oryo
  annotations: {}
  # Example (IRSA on EKS):
  #   eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/oryo-platform

# -----------------------------------------------------------------------------
# Pod-level defaults (override per-service under <service>.podSecurityContext etc.)
# -----------------------------------------------------------------------------
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false # dashboard/workers write tmp + caches
  capabilities:
    drop: ['ALL']

# -----------------------------------------------------------------------------
# Dashboard — Oryo Platform UI.
# -----------------------------------------------------------------------------
dashboard:
  enabled: true
  replicas: 1

  image:
    repository: dashboard
    tag: '' # falls back to global.imageTag

  service:
    type: ClusterIP
    port: 80
    targetPort: 3000

  containerPort: 3000

  ingress:
    enabled: false
    className: '' # e.g. nginx, alb
    # Required when ingress.enabled. Empty default so the chart fails fast
    # rather than serving a placeholder host. Set to app.<DOMAIN>.
    host: ''
    annotations: {}
    # nginx example:
    #   nginx.ingress.kubernetes.io/proxy-body-size: 10m
    # alb example:
    #   alb.ingress.kubernetes.io/scheme: internet-facing
    #   alb.ingress.kubernetes.io/target-type: ip
    #   alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    tls:
      enabled: true
      secretName: '' # Kubernetes TLS secret (omit for ALB ACM)

  # Resource requests/limits mirror ECS cpu=1024 (1 vCPU), memory=2048Mi.
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: '1'
      memory: 2Gi

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  pdb:
    enabled: false # enable when replicas > 1
    minAvailable: 1

  # Per-service DB role + secret env (mirrors db_roles.dashboard).
  db:
    user: oryo-dashboard
    role: oryo-dashboard
    # Name + key of the secret holding the dashboard DB password.
    passwordSecret:
      name: '' # e.g. oryo-db-dashboard
      key: password

  env: {}

  # Per-service env vars sourced from existing K8s Secrets (secretKeyRef).
  # Map of ENV_VAR_NAME -> { secretName, key }. Use this for credentials
  # that only this service needs (e.g. RESEND_API_KEY on dashboard).
  # For credentials shared by every workload, use global.externalSecrets.
  externalSecrets: {}
  # externalSecrets:
  #   RESEND_API_KEY:
  #     secretName: oryo-resend-api-key
  #     key: value

  # Probes hit /healthcheck on the container port (matches ALB health check).
  livenessProbe:
    httpGet:
      path: /healthcheck
      port: http
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /healthcheck
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  startupProbe:
    httpGet:
      path: /healthcheck
      port: http
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 30 # 30 * 5s = 150s startup grace

  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []

# -----------------------------------------------------------------------------
# Gateway — AI traffic inspector
# -----------------------------------------------------------------------------
gateway:
  enabled: true
  replicas: 2

  image:
    repository: gateway
    tag: ''

  service:
    type: ClusterIP
    port: 80
    targetPort: 3000

  containerPort: 3000

  ingress:
    enabled: false
    className: ''
    # Required when ingress.enabled. Set to gateway.<DOMAIN>.
    host: ''
    annotations: {}
    tls:
      enabled: true
      secretName: ''

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: '1'
      memory: 2Gi

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  pdb:
    enabled: true
    minAvailable: 1

  db:
    user: oryo-gateway
    role: oryo-gateway
    passwordSecret:
      name: ''
      key: password

  env: {}

  # See dashboard.externalSecrets above.
  externalSecrets: {}

  livenessProbe:
    httpGet:
      path: /healthcheck
      port: http
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /healthcheck
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  startupProbe:
    httpGet:
      path: /healthcheck
      port: http
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 30

  nodeSelector: {}
  tolerations: []
  affinity: {}
  # Spread gateway pods across nodes/zones for resilience.
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: gateway

# -----------------------------------------------------------------------------
# Workers — background jobs and integrations. Internal only (no Service / no Ingress).
# -----------------------------------------------------------------------------
workers:
  enabled: true
  replicas: 1

  image:
    repository: workers
    tag: ''

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 4
    targetCPUUtilizationPercentage: 75

  pdb:
    enabled: false

  db:
    user: oryo-worker
    role: oryo-worker
    passwordSecret:
      name: ''
      key: password

  env:
    LOCAL_OBJECT_STORE_BASE_PATH: /app/tmp

  # See dashboard.externalSecrets above.
  externalSecrets: {}

  # Workers have no HTTP server, so we rely on a process liveness check.
  # Override with httpGet/tcpSocket/exec if a probe endpoint is added.
  livenessProbe: {}
  readinessProbe: {}
  startupProbe: {}

  # Mounted writable tmp dir (workers write object-store payloads here).
  tmpVolume:
    enabled: true
    mountPath: /app/tmp
    sizeLimit: 1Gi

  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []

# -----------------------------------------------------------------------------
# API — public HTTP API (sensor config, executables).
# Mirrors deploy/terraform/ecs-api.tf. Connects as the `oryo-dashboard`
# Postgres role (same as ECS api today).
#
# Opt-in per env: set `api.enabled: true` in values-<env>.yaml. Omitting the
# block (or the flag) leaves api off — no Deployment / Service / Ingress.
# -----------------------------------------------------------------------------
api:
  enabled: false
  replicas: 2

  image:
    repository: api
    tag: ''

  service:
    type: ClusterIP
    port: 80
    targetPort: 5000

  containerPort: 5000

  ingress:
    enabled: false
    className: ''
    # Required when ingress.enabled. Set to api.<DOMAIN>.
    host: ''
    annotations: {}
    tls:
      enabled: true
      secretName: ''

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  pdb:
    enabled: false
    minAvailable: 1

  # api on ECS uses the dashboard role (see ecs-api.tf).
  db:
    user: oryo-dashboard
    role: oryo-dashboard
    passwordSecret:
      name: ''
      key: password

  env: {}

  # See dashboard.externalSecrets above.
  externalSecrets: {}

  livenessProbe:
    httpGet:
      path: /healthcheck
      port: http
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /healthcheck
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  startupProbe:
    httpGet:
      path: /healthcheck
      port: http
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 30

  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []

# -----------------------------------------------------------------------------
# Backoffice is intentionally omitted from this chart.
#
# It is Oryo's internal support tool (authentication gated by @oryo.io
# Google accounts) and has no use in a private customer deployment. The
# templates/backoffice/ directory was stripped from the chart shipped here.
#
# If you need it for some reason, contact licensing@oryo.io.
# -----------------------------------------------------------------------------
