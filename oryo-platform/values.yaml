# Default values for the oryo-platform chart.
# Override with -f values.custom.yaml or --set on the command line.

global:
  # ---------------------------------------------------------------------------
  # IMAGES — pulled from Oryo's distribution ECR.
  # Your AWS account must be on the allowlist; contact eng@oryo.io.
  # ---------------------------------------------------------------------------
  imageRegistry: 831622638566.dkr.ecr.us-east-1.amazonaws.com  # Oryo prod ECR
  imageTag: latest # default tag applied unless service.image.tag overrides
  imagePullPolicy: IfNotPresent
  imagePullSecrets: [] # e.g. [{ name: ecr-pull-secret }]

  nodeArchitecture: arm64

  # Create the `alb` IngressClass (EKS Auto Mode's built-in controller).
  # Set false if the class already exists in your cluster.
  createIngressClass: true
  ingressClassName: alb

  podLabels: {}

  env:
    ENV_NAME: stage # private-deploy chart default — `stage` is the private-deploy value (always)
    DOMAIN: 'example.com'                        # TODO
    APP_BASE_URL: 'https://app.example.com'      # TODO
    API_BASE_URL: 'https://api.exmaple.com'      # TODO
    DEFAULT_BUCKET: 'example-bucket'             # TODO - s3 bucket
    SENSOR_EXECUTABLES_BUCKET: binaries-pub-prod-us-east-1-oryo  # where the api serves sensor installers from; override with your own bucket if your network can't reach it
    LOGIN_CODE_FROM_EMAIL: noreply@oryo.io      # keep value if using an oryo provided Resend API Key

  # Database connection (shared across services). Per-service `db.user`/`db.role`
  db:
    host: ''                                     # TODO
    port: 5432
    database: postgres
    sslmode: require

  # env-var -> { secretName, key } for secrets managed outside the chart
  # (ESO, SealedSecrets, CSI driver).
  externalSecrets:
    SESSION_SECRET:
      secretName: oryo-session-secret
      key: value

# Sensor compatibility range served to clients (stamped at release).
sensor:
  versionRange: ''

# -----------------------------------------------------------------------------
# ServiceAccount — used by all workloads. Annotate with an IAM role ARN for
# IRSA on EKS so pods get S3 + Bedrock access without static credentials.
# -----------------------------------------------------------------------------
serviceAccount:
  create: true
  name: oryo-platform           # MUST match the SA in your IAM role's IRSA trust policy
  annotations:
    eks.amazonaws.com/role-arn: ''

# -----------------------------------------------------------------------------
# Database initialization — runs the @service/db-init image to create roles,
# tables, RLS policies, and the default tenant. Idempotent.
# -----------------------------------------------------------------------------
dbInit:
  enabled: true
  mode: hook                       # hook | manual | disabled
  backoffLimit: 3
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: 600
  resources: {}

  image:
    repository: db-init

  # Postgres admin (superuser) credentials. Required for CREATE/ALTER ROLE.
  adminSecret:
    name: oryo-db-admin
    userKey: username
    passwordKey: password

  passwordSecrets:
    DASHBOARD_USER_PASSWORD: { secretName: oryo-db-dashboard, key: password }
    GATEWAY_USER_PASSWORD:   { secretName: oryo-db-gateway,   key: password }
    WORKER_USER_PASSWORD:    { secretName: oryo-db-worker,    key: password }

  # Your Tenant Details.
  defaultTenant:
    name: '' # e.g. "Acme Corp"
    owner: '' # e.g. admin@acme.com

# -----------------------------------------------------------------------------
# Dashboard — Oryo Platform UI.
# -----------------------------------------------------------------------------
dashboard:
  enabled: true
  image:
    repository: dashboard
  replicas: 2
  containerPort: 8080
  service:
    type: ClusterIP
    port: 8080
  resources: {}
  autoscaling:
    enabled: false
  pdb:
    enabled: false
  ingress:
    enabled: true
    className: alb
    host: ''                                           # TODO
    annotations: &albAnnotations
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
      alb.ingress.kubernetes.io/ssl-redirect: '443'
      alb.ingress.kubernetes.io/certificate-arn: ''    # TODO
      alb.ingress.kubernetes.io/group.name: oryo
      alb.ingress.kubernetes.io/healthcheck-path: /healthcheck
  db:
    user: oryo-dashboard
    passwordSecret: { name: oryo-db-dashboard, key: password }
  # Email login codes via Resend. Requires RESEND_API_KEY
  externalSecrets:
    RESEND_API_KEY: { secretName: oryo-resend-api-key, key: value }

# -----------------------------------------------------------------------------
# Gateway — AI traffic inspector
# -----------------------------------------------------------------------------
gateway:
  enabled: true
  image:
    repository: gateway
  replicas: 2
  containerPort: 8080
  service:
    type: ClusterIP
    port: 8080
  resources: {}
  autoscaling:
    enabled: false
  pdb:
    enabled: false
  ingress:
    enabled: true
    className: alb
    host: gateway.example.com                          # TODO
    annotations: *albAnnotations
  db:
    user: oryo-gateway
    passwordSecret: { name: oryo-db-gateway, key: password }

workers:
  enabled: true
  image:
    repository: workers
  replicas: 1
  resources: {}
  autoscaling:
    enabled: false
  pdb:
    enabled: false
  tmpVolume:
    enabled: false
  db:
    user: oryo-worker
    passwordSecret: { name: oryo-db-worker, key: password }

api:
  enabled: true
  image:
    repository: api
  replicas: 2
  containerPort: 8080
  service:
    type: ClusterIP
    port: 8080
  resources: {}
  autoscaling:
    enabled: false
  pdb:
    enabled: false
  ingress:
    enabled: true
    className: alb
    host: api.example.com                            # TODO
    annotations: *albAnnotations
  db:
    user: oryo-dashboard
    passwordSecret: { name: oryo-db-dashboard, key: password }

