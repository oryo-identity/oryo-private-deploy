{{- if .Values.workers.enabled -}}
{{- $component := "workers" -}}
{{- $svc := .Values.workers -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "oryo.componentName" (list . $component) }}
  labels:
    {{- include "oryo.componentLabels" (list . $component) | nindent 4 }}
spec:
  {{- if not $svc.autoscaling.enabled }}
  replicas: {{ $svc.replicas }}
  {{- end }}
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "oryo.componentSelectorLabels" (list . $component) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "oryo.podLabels" (list . $component $svc) | nindent 8 }}
    spec:
      serviceAccountName: {{ include "oryo.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: 60
      containers:
        - name: {{ $component }}
          image: {{ include "oryo.image" (list . $svc) | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          env:
            {{- include "oryo.serviceEnv" (list . $svc $component) | nindent 12 }}
          {{- with $svc.startupProbe }}
          {{- if . }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- end }}
          {{- with $svc.livenessProbe }}
          {{- if . }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- end }}
          {{- with $svc.readinessProbe }}
          {{- if . }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- end }}
          resources:
            {{- toYaml $svc.resources | nindent 12 }}
          {{- if $svc.tmpVolume.enabled }}
          volumeMounts:
            - name: tmp
              mountPath: {{ $svc.tmpVolume.mountPath }}
          {{- end }}
      {{- if $svc.tmpVolume.enabled }}
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: {{ $svc.tmpVolume.sizeLimit }}
      {{- end }}
      {{- with $svc.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $svc.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      affinity:
        {{- if $svc.affinity }}
        {{- toYaml $svc.affinity | nindent 8 }}
        {{- else }}
        {{- include "oryo.archAffinity" . | nindent 8 }}
        {{- end }}
      {{- with $svc.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
